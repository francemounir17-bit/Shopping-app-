    const banner = document.getElementById('storage-banner');
    document.getElementById('storage-banner-msg').textContent = msg;
    banner.classList.add('show');
    announce(msg, 'assertive');
  }
  function hideStorageBanner() {
    document.getElementById('storage-banner').classList.remove('show');
  }

  // ============================================================
  // SHORTCUTS DIALOG
  // ============================================================
  function showShortcuts() {
    const tbody = document.getElementById('shortcuts-tbody');
    tbody.innerHTML = SHORTCUTS.map(s =>
      `<tr><td><kbd>${s.key.trim()}</kbd></td><td>${s.action}</td></tr>`
    ).join('');
    document.getElementById('shortcuts-dialog').showModal();
  }

  // ============================================================
  // MULTI-TAB SYNC
  // ============================================================
  window.addEventListener('storage', (e) => {
    if (e.key !== STORAGE_KEYS.DATA) return;
    const banner = document.getElementById('tab-banner');
    banner.classList.add('show');
  });

  // ============================================================
  // PRIVATE MODE DETECTION
  // ============================================================
  function detectPrivateMode() {
    try {
      const test = '__private_test__';
      localStorage.setItem(test, '1');
      localStorage.removeItem(test);
    } catch(e) {
      showSnackbar('القائمة ستُحذف عند إغلاق التبويب. صدّر للحفظ. ⚠', 8000);
    }
  }

  // ============================================================
  // KEYBOARD SHORTCUTS
  // ============================================================
  document.addEventListener('keydown', (e) => {
    const tag = document.activeElement?.tagName;
    const inInput = ['INPUT','SELECT','TEXTAREA'].includes(tag);

    if (!inInput && e.key === '/') {
      e.preventDefault();
      document.getElementById('item-input').focus();
    }
    if (!inInput && e.key === '?') { showShortcuts(); return; }
    if ((e.ctrlKey||e.metaKey) && e.key === 'z' && !e.shiftKey) {
      e.preventDefault(); undoAction();
    }
    if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key === 'C') {
      e.preventDefault(); clearBought();
    }
    if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key === 'E') {
      e.preventDefault(); exportJSON();
    }
    if (e.key === 'Escape') {
      if (selectMode) { exitSelectMode(); return; }
      const panel = document.getElementById('settings-panel');
      if (panel.classList.contains('open')) { closeSettings(); return; }
      hideSnackbar();
    }
  });

  // Filter pill keyboard nav
  document.getElementById('filter-bar').addEventListener('keydown', (e) => {
    const pills = [...document.querySelectorAll('.filter-pill')];
    const idx = pills.indexOf(document.activeElement);
    if (idx === -1) return;
    if (e.key === 'ArrowRight') { e.preventDefault(); pills[(idx-1+pills.length)%pills.length].focus(); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); pills[(idx+1)%pills.length].focus(); }
  });

  // ============================================================
  // EVENT WIRING
  // ============================================================
  function wireEvents() {
    // add
    document.getElementById('item-input').addEventListener('input', (e) => {
      updateAddBtn();
      updateCharCount(e.target.value);
    });
    document.getElementById('item-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const name  = e.target.value.trim();
        const catId = document.getElementById('category-select').value;
        if (checkDuplicate(name, catId)) { showDuplicateTip(); }
        addItem();
      }
    });
    document.getElementById('add-btn').addEventListener('click', () => {
      const name  = document.getElementById('item-input').value.trim();
      const catId = document.getElementById('category-select').value;
      if (checkDuplicate(name, catId)) showDuplicateTip();
      addItem();
    });

    // clear bought
    document.getElementById('clear-bought-btn').addEventListener('click', clearBought);

    // filter pills
    document.getElementById('filter-bar').addEventListener('click', (e) => {
      const pill = e.target.closest('.filter-pill');
      if (!pill) return;
      document.querySelectorAll('.filter-pill').forEach(p => {
        p.classList.remove('active'); p.setAttribute('aria-pressed','false');
      });
      pill.classList.add('active'); pill.setAttribute('aria-pressed','true');
      state.prefs.filterMode = pill.dataset.filter;
      savePrefs();
      renderAll();
      announce(`عرض: ${pill.textContent.trim()}`);
    });

    // sort
    document.getElementById('sort-select').addEventListener('change', (e) => {
      state.prefs.sortMode = e.target.value;
      savePrefs(); renderAll();
      announce(`ترتيب: ${e.target.options[e.target.selectedIndex].text}`);
    });

    // snackbar undo
    document.getElementById('snackbar-undo').addEventListener('click', () => {
      if (snackUndoFn) snackUndoFn();
      hideSnackbar();
    });

    // settings
    document.getElementById('settings-btn').addEventListener('click', openSettings);
    document.getElementById('settings-close').addEventListener('click', closeSettings);
    document.getElementById('settings-overlay').addEventListener('click', closeSettings);

    // theme buttons
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => applyTheme(btn.dataset.themeVal));
    });

    // compact
    document.getElementById('compact-toggle').addEventListener('change', (e) => {
      state.prefs.compact = e.target.checked;
      document.body.dataset.compact = String(state.prefs.compact);
      savePrefs();
    });

    // custom cats
    document.getElementById('new-cat-add').addEventListener('click', () => {
      const inp = document.getElementById('new-cat-input');
      addCustomCategory(inp.value); inp.value = '';
    });
    document.getElementById('new-cat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        addCustomCategory(e.target.value); e.target.value = '';
      }
    });

    // export/import
    document.getElementById('export-json-btn').addEventListener('click', exportJSON);
    document.getElementById('export-csv-btn').addEventListener('click', exportCSV);
    document.getElementById('export-md-btn').addEventListener('click', exportMarkdown);
    document.getElementById('storage-export-btn').addEventListener('click', exportJSON);

    const importArea = document.getElementById('import-area');
    const importFile = document.getElementById('import-file');
    importArea.addEventListener('click', () => importFile.click());
    importArea.addEventListener('keydown', e => { if (e.key === 'Enter'||e.key===' ') importFile.click(); });
    importFile.addEventListener('change', e => { handleImport(e.target.files[0]); e.target.value=''; });
    importArea.addEventListener('dragover', e => { e.preventDefault(); importArea.style.borderColor='var(--accent)'; });
    importArea.addEventListener('dragleave', () => { importArea.style.borderColor=''; });
    importArea.addEventListener('drop', e => {
      e.preventDefault(); importArea.style.borderColor='';
      handleImport(e.dataTransfer.files[0]);
    });

    // reset
    document.getElementById('reset-btn').addEventListener('click', () => {
      if (confirm('هل أنت متأكد من إعادة ضبط كل البيانات؟ لا يمكن التراجع بعد 10 ثوانٍ.')) {
        const backup = JSON.stringify(state.items);
        state.items = []; state.categories = [...DEFAULT_CATS];
        debouncedSave(); renderAll(); closeSettings();
        showSnackbar('تم إعادة الضبط. تراجع خلال 10 ثوانٍ', 10000, () => {
          state.items = JSON.parse(backup);
          debouncedSave(); renderAll();
        });
      }
    });

    // select mode
    document.getElementById('select-mode-btn').addEventListener('click', () => {
      if (selectMode) exitSelectMode(); else enterSelectMode();
    });
    document.getElementById('bulk-select-all').addEventListener('click', () => {
      getFilteredSorted().forEach(it => selectedIds.add(it.id));
      updateBulkBar(); renderAll();
    });
    document.getElementById('bulk-bought').addEventListener('click', bulkMarkBought);
    document.getElementById('bulk-delete').addEventListener('click', bulkDelete);
    document.getElementById('bulk-exit').addEventListener('click', exitSelectMode);

    // shortcuts help
    document.getElementById('shortcuts-help-btn').addEventListener('click', showShortcuts);

    // tab banner
    document.getElementById('tab-refresh-btn').addEventListener('click', () => {
      const loaded = loadData();
      state.items = loaded.items;
      state.categories = loaded.categories || [...DEFAULT_CATS];
      renderAll();
      document.getElementById('tab-banner').classList.remove('show');
    });
    document.getElementById('tab-dismiss-btn').addEventListener('click', () => {
      document.getElementById('tab-banner').classList.remove('show');
    });

    // system theme change
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (state.prefs.theme === 'system') applyTheme('system');
    });
  }

  // ============================================================
  // PERIODIC SAVE
  // ============================================================
  setInterval(() => { if (pendingChanges) { saveData(); pendingChanges = false; } }, 10000);
  window.addEventListener('beforeunload', () => { if (pendingChanges) saveData(); });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && pendingChanges) saveData();
  });

  // ============================================================
  // INIT
  // ============================================================
  function initApp() {
    const loaded = loadData();
    state.items      = loaded.items      || [];
    state.categories = loaded.categories || [...DEFAULT_CATS];
    loadPrefs();

    // Apply theme
    applyTheme(state.prefs.theme);

    // Apply compact
    document.body.dataset.compact = String(state.prefs.compact);

    // Apply sort select
    document.getElementById('sort-select').value = state.prefs.sortMode;

    // Render
    renderAll();
    wireEvents();
    detectPrivateMode();
    updateSaveStatus();
    updateAddBtn();
    refreshCategorySelects();

    // Sync filter pill UI
    document.querySelectorAll('.filter-pill').forEach(p => {
      const active = p.dataset.filter === state.prefs.filterMode;
      p.classList.toggle('active', active);
      p.setAttribute('aria-pressed', String(active));
    });
  }

  initApp();
  </script>
</body>
